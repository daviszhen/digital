services:
  postgres:
    image: postgres:16-alpine
    container_name: dstore-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payload
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: dstore-redis
    ports:
      - "6380:6379"
    restart: unless-stopped

  app:
    build: .
    container_name: dstore-app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/payload
      PAYLOAD_SECRET: payload-docker-secret-change-me
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:alpine
    container_name: dstore-caddy
    ports:
      - "8443:8443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./certs:/certs
    depends_on:
      - app
    restart: unless-stopped

volumes:
  pgdata:
